# TalkRescue Supabase configuration (Edge Functions focus).
# Run `supabase link --project-ref <ref>` after creating a remote project.

project_id = "iexhwsiqwgoksucdzpok"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_signup = true

[functions]
# Edge Functions enabled by default when serving/deploying.

# iOS client authenticates with TALKRESCUE_API_KEY via `apikey` header.
# Platform JWT check is disabled; the function validates the proxy key in code.
[functions.translate]
verify_jwt = false
